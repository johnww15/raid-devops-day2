  #     - "--collector.otlp.http.cors.allowed-origins=*"
  #     - "--collector.otlp.http.cors.allowed-headers=Content-Type,traceparent,tracestate,baggage"
  #   restart: unless-stopped
networks:
  otel_network:
    external: true
    name: opentelemetry-demo
