services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    restart: unless-stopped
    environment:
      - VITE_OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318
    networks:
      - otel_network
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    restart: unless-stopped
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
    networks:
      - otel_network
  # jaeger:
  #   image: jaegertracing/all-in-one:latest
